<script>
const I18N={el:{brandTitle:"Γνωρίστε την Ψυχολόγο - Εξαρτησιολόγο",brandName:"Ζωή Ανδρεαδάκη",navAbout:"Η Ψυχολόγος",navServices:"Υπηρεσίες",navContact:"Επικοινωνία",heroP1:"Το γραφείο της ψυχολόγου Ζωής Ανδρεαδάκη αποτελεί ένα ήρεμο καταφύγιο για όσους επιθυμούν να συνδεθούν με τον εαυτό τους.",heroP2:"Εδώ, η φροντίδα, η αποδοχή και η επιστημονική προσέγγιση συνδυάζονται, προσφέροντας στήριξη σε κάθε άνθρωπο που αναζητά ισορροπία και μια ικανοποιημένη ζωή.",heroBtn:"Κλείστε Ραντεβού Τώρα",aboutTitle:"Γνωρίστε την Ψυχολόγο Εξαρτησιολόγο, Ζωή Ανδρεαδάκη",aboutP1:"Η Ζωή Ανδρεαδάκη είναι Ψυχολόγος – Ψυχοθεραπεύτρια - Εξαρτησιολόγος με ιδιωτικό γραφείο στον Άλιμο, εξειδικευμένη στις εξαρτήσεις και στη θεραπεία συναισθηματικών διαταραχών και διαταραχών προσωπικότητας. Διαθέτει μεταπτυχιακό στην Εξαρτησιολογία και δίπλωμα στην Κλινική Ψυχοπαθολογία από την Ιατρική Σχολή του ΕΚΠΑ και πτυχίο Ψυχολογίας από το Πάντειο Πανεπιστήμιο Κοινωνικών και Πολιτικών Επιστημών και το University of Aberdeen της Σκωτίας.",aboutP2:"Έχει πολυετή εμπειρία στον χώρο της ψυχικής υγείας, έχοντας εργαστεί στο ΚΕΘΕΑ ως θεραπεύτρια σε κοινότητες απεξάρτησης φυλακισμένων και αποφυλακισμένων χρηστών, ενώ συνεργάστηκε με τον ΟΚΑΝΑ ως ψυχολόγος/εξαρτησιολόγος και την Κοινωφελή Δημοτική Επιχείρηση Πειραιά μέσω του Social Innovation Piraeus ως ερευνήτρια.",aboutP3:"Από το 2010 ασκεί ιδιωτικά το επάγγελμά της, προσφέροντας ατομική και ομαδική ψυχοθεραπεία, συμβουλευτική ενηλίκων και ανηλίκων, καθώς και θεραπεία ζεύγους, οικογένειας και εξαρτήσεων. Παράλληλα, πραγματοποιεί συνεδρίες εποπτείας για επαγγελματίες ψυχικής υγείας.",aboutP4:"Με βαθιά κατανόηση, επιστημονική κατάρτιση και συνεχή επιμόρφωση, η Ζωή Ανδρεαδάκη στηρίζει κάθε θεραπευόμενο με σεβασμό και ενσυναίσθηση, συμβάλλοντας ουσιαστικά στη βελτίωση της ψυχικής του υγείας και της ποιότητας ζωής του.",servicesTitle:"Υπηρεσίες",servicesNote:"(Όλες οι υπηρεσίες μπορούν να πραγματοποιηθούν και στην Αγγλική γλώσσα)",services:["Ατομικές και ομαδικές συνεδρίες ενηλίκων","Αντιμετώπιση και θεραπεία εξαρτήσεων","Διαχείριση διαταραχών προσωπικότητας","Αντιμετώπιση διατροφικών διαταραχών","Θεραπεία ζεύγους","Συμβουλευτική γονέων","Θεραπεία κατάθλιψης και συναισθηματικών διαταραχών","Συμβουλευτική διαχείρισης άγχους και κρίσεων πανικού","Αντιμετώπιση ψυχοσωματικών διαταραχών","Ατομικές συνεδρίες εφήβων","Υποστήριξη ΛΟΑΤΚΙ και ευάλωτων κοινωνικών ομάδων","Χορήγηση MMPI – Πολυδιάστατο ερωτηματολόγιο προσωπικότητας","Εποπτεία","Ειδικό κόστος για ΑΜΕΑ – ανέργους – φοιτητές","Συνεδρίες μέσω βιντεοκλήσης"],stat1:"Χρόνια Εμπειρίας",stat2:"Διαφορετικές Υπηρεσίες",stat3:"Ευχαριστημένοι Πελάτες",stat4:"Εξατομικευμένη Φροντίδα",specTitle:"Ειδίκευση ως Εξαρτησιολόγος",specP1:"Η ειδικότητα της εξαρτησιολογίας ασχολείται με την πρόληψη, τη διάγνωση και τη θεραπευτική αντιμετώπιση των εξαρτήσεων — είτε αυτές αφορούν ουσίες (όπως το αλκοόλ, τα ναρκωτικά ή τα φάρμακα), είτε συμπεριφορές (όπως ο τζόγος, το διαδίκτυο, τα μέσα κοινωνικής δικτύωσης ή οι εμμονικές σχέσεις). Ως εξαρτησιολόγος, η Ζωή Ανδρεαδάκη διαθέτει εξειδικευμένη εκπαίδευση και εμπειρία στην κατανόηση των μηχανισμών που οδηγούν έναν άνθρωπο στην εξάρτηση, αλλά και των ψυχολογικών, κοινωνικών και βιολογικών παραγόντων που τη συντηρούν.",specP2:'Η προσέγγισή της είναι ολιστική και βασίζεται στη βαθιά κατανόηση ότι η εξάρτηση δεν είναι απλώς μια "κακή συνήθεια", αλλά μια πολύπλοκη ψυχολογική κατάσταση που συχνά συνδέεται με εσωτερικό πόνο, άγχος, τραύμα ή συναισθηματικά κενά. Μέσα από την ψυχοθεραπευτική διαδικασία, η κα Ανδρεαδάκη βοηθά το άτομο να αναγνωρίσει τις βαθύτερες αιτίες της συμπεριφοράς του, να αναπτύξει μηχανισμούς αυτορρύθμισης και να ξαναχτίσει τη σχέση του με τον εαυτό του και τους άλλους.',specP3:"Παράλληλα, δίνει έμφαση στη στήριξη των οικογενειών, καθώς η εξάρτηση δεν επηρεάζει μόνο το άτομο, αλλά και το ευρύτερο περιβάλλον του. Μέσα από καθοδήγηση και συμβουλευτική, βοηθά τα μέλη της οικογένειας να κατανοήσουν τη φύση της εξάρτησης, να διαχειριστούν το άγχος και την ενοχή και να συμβάλουν αποτελεσματικά στην πορεία ανάρρωσης του αγαπημένου τους προσώπου.",specP4:'Η δουλειά της ως εξαρτησιολόγος δεν περιορίζεται στην "απεξάρτηση", αλλά στοχεύει στη συνολική ενδυνάμωση του ατόμου — στη δημιουργία μιας νέας ζωής με νόημα, στόχο και εσωτερική ισορροπία. Η Ζωή Ανδρεαδάκη συνοδεύει τον θεραπευόμενο με ενσυναίσθηση, σταθερότητα και ειλικρίνεια σε κάθε στάδιο αυτής της διαδρομής, βοηθώντας τον να ξαναβρεί τον έλεγχο και την ελευθερία του.',addrFull:"Εθνάρχου Μακαρίου 22, Άλιμος 174 55, Ελλάδα",hoursTitle:"Ωράριο Λειτουργίας",hoursP1:"Από Δευτέρα έως Σάββατο, κατόπιν ραντεβού, η κα Ανδρεαδάκη υποδέχεται με σεβασμό και κατανόηση όσους αναζητούν τον εαυτό και τους τρόπους να διαχειριστούν τα συναισθήματα, τις σχέσεις ή τις εσωτερικές συγκρούσεις τους.",hoursP2:"Η προσέγγισή της είναι ανθρώπινη και πρακτική — με στόχο τη σταδιακή επαναφορά της ψυχικής ισορροπίας και της ικανοποιημένης ζωής.",contactTitle:"Επικοινωνία",contactAddr:"Διεύθυνση",contactPhone:"Τηλέφωνο",addr:"Εθνάρχου Μακαρίου 22, Άλιμος, Αττική",footer:'Copyright 2025 by Andreadaki Zoe designed by <a href="https://advonmedia.com" target="_blank" rel="noopener">Advon Media</a>. All rights reserved.'},en:{brandTitle:"Meet the Psychologist & Addiction Specialist",brandName:"Zoe Andreadaki",navAbout:"The Psychologist",navServices:"Services",navContact:"Contact",heroP1:"The office of psychologist Zoe Andreadaki is a calm and welcoming space for anyone seeking to reconnect with themselves.",heroP2:"Here, care, acceptance, and scientific expertise come together to provide support to every person striving for balance and a more fulfilling life.",heroBtn:"Book Your Appointment Today",aboutTitle:"Meet the Psychologist and Addiction Specialist, Zoe Andreadaki",aboutP1:"Zoe Andreadaki is a Psychologist – Psychotherapist – Addiction Specialist, based in Alimos, Athens. She specializes in addiction treatment, as well as in emotional and personality disorders. She holds a Master's degree in Addiction Studies and a Diploma in Clinical Psychopathology from the Medical School of the National and Kapodistrian University of Athens (NKUA), and a Bachelor's degree in Psychology from Panteion University of Social and Political Sciences and the University of Aberdeen, Scotland.",aboutP2:"She has extensive experience in the field of mental health, having worked at KETHEA, providing therapy in rehabilitation programs for incarcerated and formerly incarcerated individuals, and as a psychologist/addiction specialist with OKANA. She also collaborated with the Municipal Social Innovation Piraeus Initiative as a researcher.",aboutP3:"Since 2010, she has maintained a private practice, offering individual and group psychotherapy, counseling for adults and minors, and couples, family, and addiction therapy. She also provides supervision sessions for mental health professionals.",aboutP4:"With deep understanding, professional training, and ongoing education, Zoe Andreadaki supports each client with empathy and respect, fostering genuine personal growth and improved emotional well-being.",servicesTitle:"Services",servicesNote:"(All sessions are also available in English)",services:["Individual and group therapy for adults","Treatment and counseling for addictions","Personality disorders treatment","Treatment for eating disorders","Couples therapy","Parental counseling","Therapy for depression and emotional disorders","Stress management and panic attack counseling","Treatment of psychosomatic conditions","Individual therapy for adolescents","Support for LGBTQI+ individuals and vulnerable groups","Administration of the MMPI – Minnesota Multiphasic Personality Inventory","Professional supervision","Special rates for students, unemployed individuals, and people with disabilities","Online video sessions"],stat1:"Years of Experience",stat2:"Different Services",stat3:"Satisfied Clients",stat4:"Personalized Care",specTitle:"Specialization in Addiction Treatment",specP1:"The field of Addiction Studies focuses on the prevention, diagnosis, and treatment of addictions — whether related to substances (such as alcohol, drugs, or medication) or behaviors (such as gambling, internet use, social media, or compulsive relationships). As an addiction specialist, Zoe Andreadaki has advanced training and experience in understanding the psychological, social, and biological mechanisms that contribute to addictive behavior.",specP2:'Her approach is holistic, recognizing that addiction is not simply a "bad habit" but a complex psychological condition often rooted in inner pain, anxiety, trauma, or emotional emptiness. Through psychotherapy, she helps individuals identify the deeper causes of their behavior, develop self-regulation skills, and rebuild a healthier relationship with themselves and others.',specP3:"She also emphasizes family support, understanding that addiction affects not only the individual but the entire family system. Through guidance and counseling, she helps family members understand the nature of addiction, manage stress and guilt, and effectively support their loved one's recovery.",specP4:"Her work goes beyond detoxification, focusing instead on the person's overall empowerment — helping them create a life of meaning, purpose, and emotional balance. With empathy, steadiness, and authenticity, Zoe Andreadaki walks alongside each client on their path toward healing, helping them regain control and freedom in their lives.",addrFull:"Ethnarchou Makariou 22, Alimos 174 55, Greece",hoursTitle:"Office Hours",hoursP1:"Monday to Saturday, by appointment. Ms. Andreadaki welcomes each client with respect and understanding, offering a space for self-exploration and emotional healing.",hoursP2:"Her approach is human and practical, aiming to restore inner balance and support a more satisfying, meaningful life.",contactTitle:"Contact",contactAddr:"Address",contactPhone:"Phone",addr:"Ethnarchou Makariou 22, Alimos, Attica",footer:'Copyright 2025 by Andreadaki Zoe. All rights reserved.'}};
